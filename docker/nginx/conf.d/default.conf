#############################################
# Frontend Proxy for stocksensai.com
#############################################
server {
    listen 80;
    listen 443 ssl;
    server_name stocksensai.com;

    # SSL configuration for stocksensai.com
    ssl_certificate     /etc/letsencrypt/live/stocksensai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stocksensai.com/privkey.pem;

    # ACME challenge for Certbot (if needed)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy all other requests to the frontend service
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

#############################################
# CouchDB Proxy for db.stocksensai.com
#############################################
server {
    listen 80;
    listen 443 ssl;
    server_name db.stocksensai.com;

    # SSL configuration for db.stocksensai.com
    ssl_certificate     /etc/letsencrypt/live/db.stocksensai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/db.stocksensai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Redirect any plain HTTP requests to HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    # Redirect the root URL to Fauxton (/ _utils/)
    location = / {
        return 301 /_utils/;
    }

    # Proxy requests for the Fauxton UI (/_utils/)
    location /_utils/ {
        proxy_pass http://database:5984/_utils/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Proxy all other CouchDB API requests
    location / {
        proxy_pass http://database:5984;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}