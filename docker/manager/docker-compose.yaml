services:
  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: always
    networks:
      - external
      - internal
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
      - ../couchdb_config/config.ini:/var/lib/docker/volumes/stocksensai_couchdb_config/local.ini

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../nginx/certbot/www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    restart: always
    networks:
      - external
      - internal
    depends_on:
      - certbot
      - portainer

  certbot: 
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ../nginx/certbot/www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done;'"

  database:
    image: couchdb:latest
    container_name: database
    restart: always
    networks:
      - external
      - internal
    volumes:
      - couchdb_data:/opt/couchdb/data
      - ../couchdb_config/config.ini:/opt/couchdb/etc/local.ini
    ports:
      - "5984:5984"

volumes:
  portainer_data:
  couchdb_data:

networks:
  external:
    attachable: true
  internal:
    attachable: true