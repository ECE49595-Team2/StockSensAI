version: "0.1"

services:
  database:
    image: couchdb:latest
    restart: always
    environment:
      - COUCHDB_USER=stocksensai
      - COUCHDB_PASSWORD=ComputerEngineersGoToClass
    volumes:
      - couchdb_data:/opt/couchdb/data
    ports:
      - "5984:5984"
    networks:
      - app_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  nextjs:
    image: node:18-alpine
    build: 
      context: ../frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: ["npm", "run", "dev"]
    environment:
      - NODE_ENV=development
      - COUCHDB_URL=http://couchdb:5984
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "9229:9229" # Debug port
    networks:
      - app_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  couchdb_data:

networks:
  app_network:
    driver: overlay