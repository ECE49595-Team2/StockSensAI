services:
  frontend:
    platform: linux/amd64
    image: ghcr.io/ece49595-team2/stocksensai-frontend@sha256:34c4c24dbd80494ce84d520570d167757c8418c1cfe9e64d8901d8dc04f113bc
    environment:
      - NODE_ENV=production
      - COUCHDB_URL=http://database:5984
    ports:
      - "3000:3000"
    networks:
      - manager_external
      - manager_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  algorithmic-trader:
    platform: linux/amd64
    image: ghcr.io/ece49595-team2/stocksensai-algorithmic:latest
    environment: 
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET}
    networks:
      - manager_internal 
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure     
  
  llm-server:
    platform: linux/amd64
    image: ghcr.io/ece49595-team2/stocksensai-llm-server:latest
    networks:
      - manager_internal
    environment: 
      - POLYGON_API_KEY=${POLYGON_API_KEY}
    ports:
      - "8011:8011"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  manager_external:
    external: true
  manager_internal: 
    external: true
