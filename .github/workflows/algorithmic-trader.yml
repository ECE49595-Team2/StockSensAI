name: Algorithmic Trader CI

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/algorithmic-trader/requirements.txt
        pip install flake8 pytest

    - name: Run Linter (Flake8)
      run: flake8 backend/algorithmic-trader --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Tests (Pytest)
      run: pytest backend/algorithmic-trader/tests

    - name: Log in to GHCR
      run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ECE49595-Team2 --password-stdin
      
    - name: Build the Docker image
      run: docker build --file ./backend/algorithmic-trader/Dockerfile --tag ghcr.io/ece49595-team2/stocksensai-algorithmic:latest ./backend/algorithmic-trader
      
    - name: Push the Docker image to GHCR
    - name: Push the Docker image to GHCR
      run: docker push ghcr.io/ece49595-team2/stocksensai-algorithmic:latest
