name: Algorithmic Trader CI

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/algorithmic-trader/requirements.txt
        pip install flake8 pytest

    - name: Run Linter (Flake8)
      run: flake8 backend/algorithmic-trader --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Tests (Pytest)
      run: pytest backend/algorithmic-trader/tests
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to GHCR
      run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ECE49595-Team2 --password-stdin
      
    - name: Build and push multi-arch Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend/algorithmic-trader
        file: ./backend/algorithmic-trader/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/ece49595-team2/stocksensai-algorithmic:latest

    - name: Push the Docker image to GHCR
      run: docker push ghcr.io/ece49595-team2/stocksensai-algorithmic:latest
